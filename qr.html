<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初回特典のご案内</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SE4BXZT3WW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SE4BXZT3WW');

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    window.addEventListener('load', function() {
      const qrId = getParam('utm_content') || 'unknown';
      gtag('event', 'qr_scan', {
        qr_id: qrId,
        destination: 'b-book'
      });
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbyuVZnPHZDIiA1m6zBl8--hrn__-eN7N84tTBNv_JOTMdjHP0DwasBnmM9dxUy2aYBLIg/exec';
      fetch(scriptUrl + '?qr_id=' + encodeURIComponent(qrId) + '&type=scan').catch(function(){});
    });

    function goToBooking() {
      window.location.href = "https://b-book.run/@hommage_ki_ryou";
    }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .header {
      background: #185FA5;
      padding: 1.25rem 1.5rem 1.1rem;
    }
    .header .sub { font-size: 12px; color: #B5D4F4; margin-bottom: 4px; }
    .header h1 { font-size: 20px; font-weight: 600; color: #E6F1FB; }
    .body { padding: 1.5rem 1.25rem; }

    .discount-box {
      background: #185FA5;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .discount-label { font-size: 13px; color: #B5D4F4; margin-bottom: 6px; }
    .discount-num {
      font-size: 64px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .discount-unit { font-size: 22px; font-weight: 600; color: #fff; }
    .discount-sub { font-size: 12px; color: #B5D4F4; margin-top: 6px; }

    .banner {
      background: #FAEEDA;
      border: 1px solid #EF9F27;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }
    .banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .banner-title { font-size: 13px; font-weight: 600; color: #633806; margin-bottom: 2px; }
    .banner-text { font-size: 12px; color: #854F0B; line-height: 1.6; }

    .steps { margin-bottom: 1.5rem; }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #185FA5;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text { font-size: 13px; color: #444; line-height: 1.6; padding-top: 2px; }

    .btn {
      width: 100%;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover { background: #0C447C; }
    .note { font-size: 11px; color: #aaa; text-align: center; margin-top: 10px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <p class="sub">人材派遣サービス</p>
      <h1>初回特典のご案内</h1>
    </div>
    <div class="body">

      <div class="discount-box">
        <p class="discount-label">新規ご契約の方限定</p>
        <div>
          <span class="discount-num">30</span><span class="discount-unit">% OFF</span>
        </div>
        <p class="discount-sub">初回ご利用料金より割引いたします</p>
      </div>

      <div class="banner">
        <span class="banner-icon">🎁</span>
        <div>
          <p class="banner-title">QRコードご利用特典</p>
          <p class="banner-text">このQRコードからご予約いただいた新規契約のお客様に、初回ご利用料金を30%OFFにてご提供いたします。</p>
        </div>
      </div>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <p class="step-text">下のボタンから予約ページへ進む</p>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <p class="step-text">ご希望の日程を選択して予約</p>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <p class="step-text">担当者より特典内容をご確認のうえご連絡</p>
        </div>
      </div>

      <button class="btn" onclick="goToBooking()">無料相談を予約する →</button>
      <p class="note">予約後、担当者よりご連絡いたします。<br>特典は新規契約のお客様のみ対象です。</p>
    </div>
  </div>
</body>
</html>
